name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm install

      - name: Create placeholder assets
        run: |
          sudo apt-get install -y imagemagick
          mkdir -p assets
          convert -size 1024x1024 xc:#24134D assets/icon.png
          convert -size 1242x2688 xc:#24134D assets/splash-icon.png
          convert -size 32x32 xc:#24134D assets/favicon.png

      - name: Generate native Android project
        run: npx expo prebuild --platform android --no-install

      - name: Enable JS bundling in debug builds
        run: sed -i 's/react {/react {\n    debuggableVariants = []/' android/app/build.gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: android

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace
        working-directory: android

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
